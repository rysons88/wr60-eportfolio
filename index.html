<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  body {
    background: #05050f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }
  #wrap {
    position: relative;
    width: 100%;
    height: 600px;
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  .content {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
    width: 90%;
  }
  .label {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.4s;
  }
  .name {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(42px, 7vw, 80px);
    font-weight: 200;
    color: #f5f0e8;
    letter-spacing: 0.08em;
    line-height: 1;
    opacity: 0;
    animation: fadeUp 1.2s ease forwards 0.7s;
  }
  .divider {
    width: 0px;
    height: 0.5px;
    background: rgba(255,255,255,0.2);
    animation: expandLine 1s ease forwards 1.4s;
  }
  .typing-wrap {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(12px, 1.6vw, 15px);
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.04em;
    line-height: 1.7;
    min-height: 24px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.6s;
  }
  .cursor {
    display: inline-block;
    width: 1.5px;
    height: 1em;
    background: rgba(255,255,255,0.4);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.9s step-end infinite;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes expandLine {
    from { width: 0px; }
    to   { width: 80px; }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="bg"></canvas>
  <div class="content">
    <p class="label">Writing Portfolio &nbsp;&middot;&nbsp; Writing 60 &nbsp;&middot;&nbsp; Winter Quarter</p>
    <h1 class="name">Ryson Sun</h1>
    <div class="divider"></div>
    <p class="typing-wrap"><span id="typed"></span><span class="cursor"></span></p>
  </div>
</div>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H;

let stars = [];
function initStars() {
  stars = [];
  const n = Math.floor((W * H) / 3500);
  for (let i = 0; i < n; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.1 + 0.2,
      speed: Math.random() * 0.25 + 0.05,
      twinkleOffset: Math.random() * Math.PI * 2,
      twinkleSpeed: Math.random() * 0.02 + 0.008,
    });
  }
}

let shoots = [];
function spawnShoot() {
  shoots.push({
    x: Math.random() * W,
    y: Math.random() * H * 0.5,
    len: Math.random() * 100 + 50,
    speed: Math.random() * 5 + 4,
    angle: Math.PI / 5,
    life: 0,
    maxLife: Math.random() * 28 + 18,
  });
}
setInterval(spawnShoot, 2800);
