<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  body { background: #05050f; display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; overflow: hidden; cursor: none; }
  #wrap { position: relative; width: 100%; height: 100vh; }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  .content {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2; text-align: center;
    display: flex; flex-direction: column;
    align-items: center; gap: 1.2rem;
    width: 50%; pointer-events: none; white-space: nowrap;
  }
  .label { font-size: 11px; font-weight: 300; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.35); opacity: 0; animation: fadeUp 1s ease forwards 0.4s; }
  .name { font-family: 'DM Sans', sans-serif; font-size: clamp(36px, 5.5vw, 76px); font-weight: 200; color: #f5f0e8; letter-spacing: 0.08em; line-height: 1; opacity: 0; animation: fadeUp 1.2s ease forwards 0.7s; }
  .divider { width: 0px; height: 0.5px; background: rgba(255,255,255,0.2); animation: expandLine 1s ease forwards 1.4s; }
  .typing-wrap { font-size: clamp(11px, 1.1vw, 13px); font-weight: 300; color: rgba(255,255,255,0.5); letter-spacing: 0.04em; line-height: 1.7; min-height: 24px; opacity: 0; animation: fadeUp 0.8s ease forwards 1.6s; }
  .cursor { display: inline-block; width: 1.5px; height: 1em; background: rgba(255,255,255,0.4); margin-left: 2px; vertical-align: middle; animation: blink 0.9s step-end infinite; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  @keyframes expandLine { from { width:0px; } to { width:80px; } }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="bg"></canvas>
  <div class="content">
    <p class="label">Writing Portfolio &nbsp;&middot;&nbsp; Writing 60 &nbsp;&middot;&nbsp; Winter Quarter</p>
    <h1 class="name">Ryson Sun</h1>
    <div class="divider"></div>
    <p class="typing-wrap"><span id="typed"></span><span class="cursor"></span></p>
  </div>
</div>
<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H, mouse={x:-999,y:-999}, sunHovered=false, sunPulse=0;
let stars=[], shoots=[], cursorTrail=[];
const SUN={x:0,y:0,radius:0,rayCount:16,angle:0,speed:0.004};

const PLANET_DEFS = [
  { label:'Context Project',         url:'https://canvas.eee.uci.edu/eportfolios/144105/context-project',         size:0.046, type:'saturn'  },
  { label:'Week 1: Self Assessment', url:'https://canvas.eee.uci.edu/eportfolios/144105/week-1-self-assessment',  size:0.030, type:'neptune' },
  { label:'Annotated Bibliography',  url:'https://canvas.eee.uci.edu/eportfolios/144105/annotated-bibliography',  size:0.036, type:'jupiter' },
  { label:'Advocacy Project',        url:'https://canvas.eee.uci.edu/eportfolios/144105/advocacy-project',        size:0.027, type:'mars'    },
  { label:'Archives',                url:'https://canvas.eee.uci.edu/eportfolios/144105/archives',                size:0.032, type:'earth'   },
  { label:'Reflective Introduction', url:'https://canvas.eee.uci.edu/eportfolios/144105/reflective-introduction', size:0.028, type:'uranus'  },
];

let orbitR, centerX, centerY;
const TOTAL = 7;
const STEP = (Math.PI*2) / TOTAL;
const SUN_ANGLE = -Math.PI/4;
const planetAngles = PLANET_DEFS.map((_,i) => SUN_ANGLE + (i+1)*STEP);
let planetStates = PLANET_DEFS.map(()=>({ hovered:false, glow:0, bobOffset:Math.random()*Math.PI*2, rot:Math.random()*Math.PI*2 }));
let t=0;

// Diagonal ship -- alternates between bottom-left to top-right and top-left to bottom-right
const SHIP = { x:0, y:0, vx:0, vy:0, trail:[], pass:0 };

function launchShip() {
  // Alternate diagonal directions each pass
  if (SHIP.pass % 2 === 0) {
    // bottom-left to top-right
    SHIP.x = -60;
    SHIP.y = H + 60;
    SHIP.vx = W * 0.0028;
    SHIP.vy = -H * 0.0022;
  } else {
    // top-left to bottom-right
    SHIP.x = -60;
    SHIP.y = -60;
    SHIP.vx = W * 0.0028;
    SHIP.vy = H * 0.0022;
  }
  SHIP.trail = [];
}

function scheduleShip() {
  setTimeout(() => {
    SHIP.pass++;
    launchShip();
  }, 2500 + Math.random() * 3000);
}

function getPlanetPos(angle, state) {
  return {
    x: centerX + Math.cos(angle)*orbitR,
    y: centerY + Math.sin(angle)*orbitR + Math.sin(t*0.011+state.bobOffset)*7
  };
}

function drawEarth(x,y,r,rot){
  const g=ctx.createRadialGradient(x-r*.2,y-r*.2,r*.05,x,y,r);
  g.addColorStop(0,'#4a9eda');g.addColorStop(.5,'#1a6090');g.addColorStop(1,'#0a2a50');
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  ctx.save();ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.clip();
  ctx.fillStyle='#4a9a50';
  [[x-r*.1,y-r*.3,r*.45,r*.35],[x+r*.25,y+r*.1,r*.3,r*.4],[x-r*.4,y+r*.2,r*.28,r*.25]].forEach(([cx,cy,rw,rh])=>{ctx.beginPath();ctx.ellipse(cx,cy,rw,rh,rot,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle='rgba(255,255,255,.22)';
  [[x+r*.1,y-r*.5,r*.5,r*.12],[x-r*.3,y+r*.35,r*.4,r*.1]].forEach(([cx,cy,rw,rh])=>{ctx.beginPath();ctx.ellipse(cx,cy,rw,rh,0,0,Math.PI*2);ctx.fill();});
  ctx.restore();
}
function drawMars(x,y,r){
  const g=ctx.createRadialGradient(x-r*.25,y-r*.25,r*.05,x,y,r);
  g.addColorStop(0,'#d4704a');g.addColorStop(.5,'#a84030');g.addColorStop(1,'#5a1810');
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  ctx.save();ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.clip();
  ctx.fillStyle='rgba(80,20,10,.35)';ctx.beginPath();ctx.ellipse(x+r*.2,y+r*.1,r*.3,r*.2,.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.55)';ctx.beginPath();ctx.ellipse(x,y-r*.8,r*.3,r*.15,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
}
function drawJupiter(x,y,r,rot){
  const g=ctx.createRadialGradient(x,y-r*.1,r*.1,x,y,r);
  g.addColorStop(0,'#e8c89a');g.addColorStop(1,'#8a5a30');
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  ctx.save();ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.clip();
  [['rgba(180,110,60,.55)',.18],['rgba(220,170,100,.4)',.05],['rgba(160,90,50,.5)',-.12],['rgba(200,140,80,.35)',-.28],['rgba(140,80,40,.45)',.35]].forEach(([col,dy])=>{ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(x,y+r*dy,r*1.01,r*.12,0,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle='rgba(180,60,40,.65)';ctx.beginPath();ctx.ellipse(x+r*.2,y+r*.08,r*.22,r*.13,rot,0,Math.PI*2);ctx.fill();
  ctx.restore();
}
function drawSaturn(x,y,r){
  ctx.save();ctx.translate(x,y);ctx.rotate(.35);ctx.scale(1,.28);
  ctx.beginPath();ctx.arc(0,0,r*2.1,0,Math.PI*2);ctx.strokeStyle='rgba(180,150,100,.18)';ctx.lineWidth=r*.55;ctx.stroke();ctx.restore();
  const g=ctx.createRadialGradient(x-r*.2,y-r*.2,r*.05,x,y,r);
  g.addColorStop(0,'#f0d898');g.addColorStop(.5,'#c8a050');g.addColorStop(1,'#705020');
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  ctx.save();ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.clip();
  [['rgba(180,140,60,.4)',.15],['rgba(140,100,40,.35)',-.1],['rgba(200,160,80,.3)',.32]].forEach(([col,dy])=>{ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(x,y+r*dy,r*1.01,r*.1,0,0,Math.PI*2);ctx.fill();});
  ctx.restore();
  ctx.save();ctx.translate(x,y);ctx.rotate(.35);ctx.scale(1,.28);
  ctx.beginPath();ctx.arc(0,0,r*2.1,Math.PI,Math.PI*2);ctx.strokeStyle='rgba(220,190,130,.6)';ctx.lineWidth=r*.55;ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,r*1.65,Math.PI,Math.PI*2);ctx.strokeStyle='rgba(180,150,90,.35)';ctx.lineWidth=r*.2;ctx.stroke();ctx.restore();
}
function drawNeptune(x,y,r){
  const g=ctx.createRadialGradient(x-r*.25,y-r*.25,r*.05,x,y,r);
  g.addColorStop(0,'#6090e0');g.addColorStop(.5,'#2848a8');g.addColorStop(1,'#0c1850');
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  ctx.save();ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.clip();
  ctx.fillStyle='rgba(100,160,240,.3)';ctx.beginPath();ctx.ellipse(x-r*.1,y-r*.2,r*.6,r*.18,.3,0,Math.PI*2);ctx.fill();ctx.restore();
}
function drawUranus(x,y,r){
  ctx.save();ctx.translate(x,y);ctx.rotate(.3);ctx.scale(1,.25);
  ctx.beginPath();ctx.arc(0,0,r*1.7,0,Math.PI*2);ctx.strokeStyle='rgba(150,220,220,.20)';ctx.lineWidth=r*.28;ctx.stroke();ctx.restore();
  const g=ctx.createRadialGradient(x-r*.2,y-r*.2,r*.05,x,y,r);
  g.addColorStop(0,'#9eeedd');g.addColorStop(.5,'#40a8a0');g.addColorStop(1,'#105858');
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  ctx.save();ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.clip();
  ctx.fillStyle='rgba(160,240,235,.18)';ctx.beginPath();ctx.ellipse(x,y-r*.25,r*.8,r*.18,0,0,Math.PI*2);ctx.fill();ctx.restore();
  ctx.save();ctx.translate(x,y);ctx.rotate(.3);ctx.scale(1,.25);
  ctx.beginPath();ctx.arc(0,0,r*1.7,Math.PI,Math.PI*2);ctx.strokeStyle='rgba(180,240,240,.42)';ctx.lineWidth=r*.28;ctx.stroke();ctx.restore();
}

function drawPlanet(p,state,pos){
  const r=p.size*Math.min(W,H); const {x,y}=pos;
  state.rot=(state.rot||0)+0.002;
  if(state.hovered) state.glow=Math.min(state.glow+0.09,1); else state.glow=Math.max(state.glow-0.05,0);
  if(state.glow>0){
    const glowR=r*(1.7+state.glow*0.6);
    const gg=ctx.createRadialGradient(x,y,r*0.8,x,y,glowR);
    const gc={earth:'100,180,255',mars:'220,100,60',jupiter:'200,140,80',saturn:'220,180,100',neptune:'80,130,240',uranus:'80,200,200'};
    gg.addColorStop(0,`rgba(${gc[p.type]},${0.15*state.glow})`);gg.addColorStop(1,`rgba(${gc[p.type]},0)`);
    ctx.beginPath();ctx.arc(x,y,glowR,0,Math.PI*2);ctx.fillStyle=gg;ctx.fill();
  }
  if(p.type==='earth') drawEarth(x,y,r,state.rot);
  else if(p.type==='mars') drawMars(x,y,r);
  else if(p.type==='jupiter') drawJupiter(x,y,r,state.rot);
  else if(p.type==='saturn') drawSaturn(x,y,r);
  else if(p.type==='neptune') drawNeptune(x,y,r);
  else if(p.type==='uranus') drawUranus(x,y,r);
  const sh=ctx.createRadialGradient(x-r*.38,y-r*.38,0,x-r*.2,y-r*.2,r*.75);
  sh.addColorStop(0,'rgba(255,255,255,.2)');sh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=sh;ctx.fill();
  const limb=ctx.createRadialGradient(x+r*.3,y+r*.3,r*.4,x,y,r);
  limb.addColorStop(0,'rgba(0,0,0,0)');limb.addColorStop(1,'rgba(0,0,0,.45)');
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=limb;ctx.fill();
  if(state.glow>0.05){
    ctx.save();ctx.globalAlpha=state.glow;
    const fs=Math.max(11,r*.48);
    ctx.font=`300 ${fs}px 'DM Sans', sans-serif`;ctx.textAlign='center';
    const tw=ctx.measureText(p.label).width,pad=10,lh=fs+6,labelY=y-r*2.1;
    ctx.fillStyle='rgba(6,6,16,.80)';ctx.beginPath();ctx.roundRect(x-tw/2-pad,labelY-lh+4,tw+pad*2,lh*1.4,5);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.90)';ctx.fillText(p.label,x,labelY);ctx.restore();
  }
}

function drawShipAt(x, y, heading) {
  const s = Math.min(W,H)*0.045;
  ctx.save(); ctx.translate(x,y); ctx.rotate(heading);
  const flicker = s*(1.0+0.5*Math.sin(Date.now()*0.04));
  const fg = ctx.createLinearGradient(-s,0,-s-flicker,0);
  fg.addColorStop(0,'rgba(255,210,60,1)');fg.addColorStop(0.4,'rgba(255,100,20,0.8)');fg.addColorStop(1,'rgba(255,40,0,0)');
  ctx.beginPath();ctx.moveTo(-s*0.95,-s*0.2);ctx.lineTo(-s*0.95-flicker,0);ctx.lineTo(-s*0.95,s*0.2);ctx.closePath();ctx.fillStyle=fg;ctx.fill();
  const bg=ctx.createLinearGradient(0,-s*0.35,0,s*0.35);
  bg.addColorStop(0,'#ccd6e8');bg.addColorStop(0.5,'#eef2ff');bg.addColorStop(1,'#7a90aa');
  ctx.beginPath();ctx.moveTo(s,0);ctx.bezierCurveTo(s*0.5,-s*0.3,-s*0.3,-s*0.3,-s,-s*0.18);ctx.lineTo(-s,s*0.18);ctx.bezierCurveTo(-s*0.3,s*0.3,s*0.5,s*0.3,s,0);ctx.closePath();ctx.fillStyle=bg;ctx.fill();
  ctx.strokeStyle='rgba(160,190,230,0.3)';ctx.lineWidth=0.5;ctx.stroke();
  const cg=ctx.createRadialGradient(s*0.25,-s*0.05,0,s*0.2,0,s*0.28);
  cg.addColorStop(0,'rgba(180,235,255,1)');cg.addColorStop(0.5,'rgba(80,160,220,0.8)');cg.addColorStop(1,'rgba(20,70,130,0.4)');
  ctx.beginPath();ctx.ellipse(s*0.22,0,s*0.28,s*0.16,0,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();
  ctx.beginPath();ctx.moveTo(s*0.05,-s*0.28);ctx.lineTo(-s*0.45,-s*0.62);ctx.lineTo(-s*0.8,-s*0.28);ctx.closePath();ctx.fillStyle='#7a90aa';ctx.fill();
  ctx.beginPath();ctx.moveTo(s*0.05,s*0.28);ctx.lineTo(-s*0.45,s*0.62);ctx.lineTo(-s*0.8,s*0.28);ctx.closePath();ctx.fillStyle='#7a90aa';ctx.fill();
  ctx.restore();
}

function initStars(){stars=[];const n=Math.floor((W*H)/3200);for(let i=0;i<n;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+.2,speed:Math.random()*.25+.05,twinkleOffset:Math.random()*Math.PI*2,twinkleSpeed:Math.random()*.02+.008});}
function spawnShoot(){shoots.push({x:Math.random()*W,y:Math.random()*H*.5,len:Math.random()*100+50,speed:Math.random()*5+4,angle:Math.PI/5,life:0,maxLife:Math.random()*28+18});}
setInterval(spawnShoot,2800);

function resize(){
  const wrap=document.getElementById('wrap');
  W=canvas.width=wrap.offsetWidth; H=canvas.height=wrap.offsetHeight;
  SUN.radius=Math.min(W,H)*0.082;
  centerX=W*0.50; centerY=H*0.52;
  orbitR=Math.min(W,H)*0.36;
  SUN.x=centerX+Math.cos(SUN_ANGLE)*orbitR;
  SUN.y=centerY+Math.sin(SUN_ANGLE)*orbitR;
  initStars();
  SHIP.pass=0;
  launchShip();
}
resize(); window.addEventListener('resize',resize);

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  mouse.x=e.clientX-rect.left; mouse.y=e.clientY-rect.top;
  for(let i=0;i<3;i++) cursorTrail.push({x:mouse.x+(Math.random()-.5)*8,y:mouse.y+(Math.random()-.5)*8,r:Math.random()*1.8+.4,alpha:.9,vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.6-.3,color:Math.random()>.5?'255,235,160':'160,215,255'});
  const dx=mouse.x-SUN.x,dy=mouse.y-SUN.y;
  sunHovered=Math.sqrt(dx*dx+dy*dy)<SUN.radius*1.4;
  planetStates.forEach((state,i)=>{
    const pos=getPlanetPos(planetAngles[i],state);
    const r=PLANET_DEFS[i].size*Math.min(W,H);
    const ddx=mouse.x-pos.x,ddy=mouse.y-pos.y;
    state.hovered=Math.sqrt(ddx*ddx+ddy*ddy)<r*1.8;
  });
});
canvas.addEventListener('mouseleave',()=>{mouse.x=-999;sunHovered=false;planetStates.forEach(s=>s.hovered=false);});
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const cx=e.clientX-rect.left,cy=e.clientY-rect.top;
  planetStates.forEach((state,i)=>{
    const pos=getPlanetPos(planetAngles[i],state);
    const r=PLANET_DEFS[i].size*Math.min(W,H);
    const ddx=cx-pos.x,ddy=cy-pos.y;
    if(Math.sqrt(ddx*ddx+ddy*ddy)<r*1.8) window.open(PLANET_DEFS[i].url,'_blank');
  });
});

function draw(){
  t++;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#05050f';ctx.fillRect(0,0,W,H);
  const grad=ctx.createRadialGradient(SUN.x,SUN.y,SUN.radius*.5,SUN.x,SUN.y,H*.9);
  grad.addColorStop(0,'rgba(40,20,5,.55)');grad.addColorStop(.3,'rgba(15,8,25,.4)');grad.addColorStop(1,'rgba(5,5,15,0)');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  for(const s of stars){s.y-=s.speed;if(s.y<-2){s.y=H+2;s.x=Math.random()*W;}const tw=.5+.5*Math.sin(t*s.twinkleSpeed+s.twinkleOffset);ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,250,240,${.25+.65*tw})`;ctx.fill();}
  for(let i=shoots.length-1;i>=0;i--){const s=shoots[i];s.life++;s.x+=Math.cos(s.angle)*s.speed;s.y+=Math.sin(s.angle)*s.speed;const alpha=1-s.life/s.maxLife;if(s.life>=s.maxLife){shoots.splice(i,1);continue;}const sg=ctx.createLinearGradient(s.x,s.y,s.x-Math.cos(s.angle)*s.len,s.y-Math.sin(s.angle)*s.len);sg.addColorStop(0,`rgba(255,248,220,${alpha})`);sg.addColorStop(1,'rgba(255,248,220,0)');ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-Math.cos(s.angle)*s.len,s.y-Math.sin(s.angle)*s.len);ctx.strokeStyle=sg;ctx.lineWidth=1.2;ctx.stroke();}

  ctx.save();ctx.beginPath();ctx.arc(centerX,centerY,orbitR,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=1;ctx.setLineDash([6,10]);ctx.stroke();ctx.setLineDash([]);ctx.restore();

  PLANET_DEFS.forEach((p,i)=>{ const pos=getPlanetPos(planetAngles[i],planetStates[i]); drawPlanet(p,planetStates[i],pos); });

  // Update diagonal ship
  SHIP.x += SHIP.vx; SHIP.y += SHIP.vy;
  SHIP.trail.push({x:SHIP.x, y:SHIP.y});
  if(SHIP.trail.length > 55) SHIP.trail.shift();
  for(let i=0;i<SHIP.trail.length;i++){
    const p=SHIP.trail[i];
    ctx.beginPath();ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
    ctx.fillStyle=`rgba(160,210,255,${(i/SHIP.trail.length)*0.3})`;ctx.fill();
  }
  const heading = Math.atan2(SHIP.vy, SHIP.vx);
  drawShipAt(SHIP.x, SHIP.y, heading);
  // Check if off screen
  if(SHIP.x > W+120 || SHIP.y < -120 || SHIP.y > H+120) {
    scheduleShip();
  }

  if(sunHovered)sunPulse=Math.min(sunPulse+.08,1);else sunPulse=Math.max(sunPulse-.05,0);
  const ps=1+sunPulse*.22+.04*Math.sin(t*.08)*sunPulse, sunR=SUN.radius*ps;
  SUN.angle+=SUN.speed*(1+sunPulse*1.5);
  for(const [r,color] of [[sunR*4,`rgba(255,160,40,${.04+sunPulse*.06})`],[sunR*2.8,`rgba(255,185,70,${.08+sunPulse*.1})`],[sunR*1.8,`rgba(255,200,100,${.14+sunPulse*.12})`],[sunR*1.25,`rgba(255,215,120,${.22+sunPulse*.15})`]]){const g=ctx.createRadialGradient(SUN.x,SUN.y,0,SUN.x,SUN.y,r);g.addColorStop(0,color);g.addColorStop(1,'rgba(255,150,30,0)');ctx.beginPath();ctx.arc(SUN.x,SUN.y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}
  ctx.save();ctx.translate(SUN.x,SUN.y);ctx.rotate(SUN.angle);
  for(let i=0;i<SUN.rayCount;i++){const a=(i/SUN.rayCount)*Math.PI*2,iR=sunR*1.18,oRr=sunR*(i%2===0?2.4:1.85),hW=i%2===0?.04:.025;ctx.beginPath();ctx.moveTo(Math.cos(a-hW)*iR,Math.sin(a-hW)*iR);ctx.lineTo(Math.cos(a)*oRr,Math.sin(a)*oRr);ctx.lineTo(Math.cos(a+hW)*iR,Math.sin(a+hW)*iR);ctx.closePath();ctx.fillStyle=`rgba(255,210,100,${i%2===0?.55:.35})`;ctx.fill();}
  ctx.restore();
  const sb=ctx.createRadialGradient(SUN.x-sunR*.25,SUN.y-sunR*.25,sunR*.05,SUN.x,SUN.y,sunR);
  sb.addColorStop(0,'#fff8e0');sb.addColorStop(.35,'#ffd060');sb.addColorStop(.75,'#ffaa28');sb.addColorStop(1,'#e07010');
  ctx.beginPath();ctx.arc(SUN.x,SUN.y,sunR,0,Math.PI*2);ctx.fillStyle=sb;ctx.fill();
  ctx.beginPath();ctx.arc(SUN.x,SUN.y,sunR,0,Math.PI*2);ctx.strokeStyle=`rgba(255,230,130,${.35+sunPulse*.4})`;ctx.lineWidth=1.5+sunPulse*2;ctx.stroke();

  for(let i=cursorTrail.length-1;i>=0;i--){const p=cursorTrail[i];p.x+=p.vx;p.y+=p.vy;p.alpha-=.035;if(p.alpha<=0){cursorTrail.splice(i,1);continue;}ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(${p.color},${p.alpha})`;ctx.fill();}
  const anyHovered=planetStates.some(s=>s.hovered);
  canvas.style.cursor=anyHovered?'pointer':'none';
  if(!anyHovered&&mouse.x>0){ctx.beginPath();ctx.arc(mouse.x,mouse.y,3,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.9)';ctx.fill();ctx.beginPath();ctx.arc(mouse.x,mouse.y,8,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=.8;ctx.stroke();}
  requestAnimationFrame(draw);
}
draw();

const phrases=['A writing portfolio for Writing 60, Winter Quarter.','Documenting my growth as a writer through UC Irvine.','Artifacts showcasing my writing abilities throughout the course.'];
let pi=0,ci=0,deleting=false;
const el=document.getElementById('typed');
function type(){const phrase=phrases[pi];if(!deleting){el.textContent=phrase.slice(0,++ci);if(ci===phrase.length){deleting=true;setTimeout(type,2400);return;}setTimeout(type,55);}else{el.textContent=phrase.slice(0,--ci);if(ci===0){deleting=false;pi=(pi+1)%phrases.length;setTimeout(type,400);return;}setTimeout(type,28);}}
setTimeout(type,2200);
</script>
